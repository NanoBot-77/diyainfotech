name: Build Debug APK

on:
  push:
    branches:
      - main

jobs:
  build-debug:
    runs-on: ubuntu-latest

    env:
      JAVA_VERSION: 17
      FLUTTER_VERSION: 3.38.6
      APP_NAME: DiyaInfotech
 
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Clean previous builds
        run: flutter clean

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Prepare APK and version
        run: |
          VERSION="v0.0.${{ github.run_number }}"
          APK_NAME="${APP_NAME}-debug-${VERSION}.apk"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV

          mv build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/$APK_NAME

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Debug Build ${{ env.VERSION }}
          body: |
            Auto-generated debug build
            Commit: ${{ github.sha }}
          files: build/app/outputs/flutter-apk/${{ env.APK_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}






